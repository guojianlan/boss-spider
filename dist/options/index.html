<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boss Spider 设置</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        background: #f5f7fb;
        color: #111827;
      }
      #app {
        max-width: 840px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }
      .panel {
        background: #fff;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        margin-bottom: 16px;
      }
      h1 {
        font-size: 28px;
        margin: 0 0 12px;
      }
      h2 {
        font-size: 16px;
        margin: 0 0 12px;
      }
      p {
        font-size: 14px;
        line-height: 1.6;
        color: #4b5563;
      }
      .field {
        margin-bottom: 14px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      input, textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        padding: 11px 12px;
        font-size: 14px;
        background: #fff;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        background: #2563eb;
        color: #fff;
      }
      .status {
        margin-left: 12px;
        font-size: 13px;
        color: #047857;
      }
      .muted {
        color: #6b7280;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="./index.js"></script>
  </body>
</html>
