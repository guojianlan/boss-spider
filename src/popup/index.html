<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boss Spider</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-width: 360px;
        background: #f5f7fb;
        color: #111827;
      }
      #app {
        padding: 16px;
      }
      .panel {
        background: #fff;
        border-radius: 12px;
        padding: 14px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        margin-bottom: 12px;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 10px;
      }
      h2 {
        font-size: 14px;
        margin: 0 0 8px;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #eef2ff;
        color: #3730a3;
      }
      .status.error {
        background: #fef2f2;
        color: #b91c1c;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      input, textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        background: #fff;
      }
      textarea {
        resize: vertical;
        min-height: 76px;
      }
      .field {
        margin-bottom: 12px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .actions {
        display: flex;
        gap: 10px;
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      button.primary {
        background: #2563eb;
        color: #fff;
      }
      button.secondary {
        background: #e5e7eb;
        color: #111827;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .hint, .summary-row {
        font-size: 12px;
        color: #4b5563;
      }
      .summary-row + .summary-row {
        margin-top: 6px;
      }
      .link {
        color: #2563eb;
        cursor: pointer;
        text-decoration: underline;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="./index.js"></script>
  </body>
</html>
